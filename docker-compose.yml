services:
  app:
    build: .
    container_name: nexacore_app
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_NAME: ${APP_NAME:-NexaCore}
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      LOG_CHANNEL: stack
      LOG_LEVEL: warning
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nexacore}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      FILESYSTEM_DISK: r2
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_REGION: auto
      R2_BUCKET: ${R2_BUCKET:-nexacoreaduanal}
      R2_URL: ${R2_URL}
      R2_ENDPOINT: ${R2_ENDPOINT}
      PECEM_API_URL: ${PECEM_API_URL}
      CHECK_TRAFICO_TOKEN: ${CHECK_TRAFICO_TOKEN}
      N8N_MODULACION_WHATSAPP_URL: ${N8N_MODULACION_WHATSAPP_URL}
      N8N_MODULACION_WHATSAPP_TOKEN: ${N8N_MODULACION_WHATSAPP_TOKEN}
      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      BROADCAST_DRIVER: log
      CACHE_DRIVER: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: file
      SESSION_LIFETIME: "120"
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-NexaCore}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nexacore

  mysql:
    image: mysql:8.4
    container_name: nexacore_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-nexacore}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexacore

networks:
  nexacore:
    driver: bridge

volumes:
  mysql_data:
  storage_data:
