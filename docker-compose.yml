services:
  app:
    build: .
    container_name: nexacore_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage/app:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    env_file:
      - .env.production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nexacore

  nginx:
    image: nginx:1.27-alpine
    container_name: nexacore_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - nexacore

  mysql:
    image: mysql:8.4
    container_name: nexacore_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-nexacore}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexacore

networks:
  nexacore:
    driver: bridge

volumes:
  mysql_data:
